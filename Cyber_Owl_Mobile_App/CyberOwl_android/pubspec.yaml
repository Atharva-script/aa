name: cyberowl_parent
description: "CyberOwl Parent Control - Mobile app for parents to control and monitor CyberOwl Windows application"
publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # HTTP & API
  http: ^1.2.0
  
  # State Management
  provider: ^6.1.2
  
  # Local Storage
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^10.0.0
  
  # Push Notifications (Local - no Firebase needed)
  flutter_local_notifications: ^18.0.1
  
  # Charts & Visualization
  fl_chart: ^0.70.2
  
  # UI Components
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.1
  fluentui_system_icons: ^1.1.255
  
  # Animations
  animations: ^2.0.11
  
  # Utils
  intl: ^0.20.2
  wake_on_lan: ^4.0.0
  connectivity_plus: ^6.1.3
  url_launcher: ^6.3.1
  google_sign_in: ^6.2.1
  image_picker: ^1.2.0
  local_auth: ^2.2.0
  hugeicons: ^1.1.5
  icons_plus: ^5.0.0
  socket_io_client: ^3.1.4
  supabase_flutter: ^2.12.0
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "android/logo_final_transparent.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF" # Using white to match other premium apps in screenshot
  adaptive_icon_foreground: "android/logo_final_transparent.png"
  remove_alpha_ios: true

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Assets
  assets:
    - .env
    - assets/logo/
    - assets/images/
    - android/nl.png

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
