<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Monitoring - Cyber Owl</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f7fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border-top: 5px solid #10b981;
        }

        .header {
            background-color: #0f172a;
            /* Dark Navy Blue */
            color: #ffffff;
            text-align: center;
            padding: 30px 20px;
        }

        .logo {
            width: 50px;
            height: auto;
            margin-bottom: 10px;
        }

        .brand-name {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            margin: 0;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 12px;
            color: #94a3b8;
            letter-spacing: 2px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .content {
            padding: 40px 30px;
            text-align: center;
        }

        .status-card {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .icon {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
        }

        .title {
            color: #1e293b;
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 10px 0;
        }

        .message {
            color: #64748b;
            font-size: 16px;
            line-height: 1.6;
            margin: 0;
        }

        .time-badge {
            display: inline-block;
            background-color: #e2e8f0;
            color: #475569;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 20px;
        }

        .footer {
            background-color: #f8fafc;
            border-top: 1px solid #e2e8f0;
            padding: 20px;
            text-align: center;
            color: #94a3b8;
            font-size: 12px;
        }

        .icon-success {
            color: #10b981;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <img src="https://cyber-owl.netlify.app/assets/logo.png" alt="Cyber Owl Logo" class="logo">
            <h1 class="brand-name">CYBER OWL</h1>
            <div class="tagline">ENSURE CHILD SECURITY</div>
        </div>

        <!-- Content -->
        <div class="content">
            <div class="status-card">
                <!-- SVG Icon for Start/Play -->
                <svg class="icon icon-success" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z">
                    </path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>

                <h2 class="title">System Active</h2>
                <p class="message">
                    The Cyber Owl protection system has been successfully activated. Real-time monitoring for audio and
                    content safety is now running.
                </p>

                <div class="time-badge">
                    Active Since: {{timestamp}}
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            &copy; 2026 Cyber Owl Defense System.<br>
            Ensuring a safer digital environment for everyone.
        </div>
    </div>
</body>

</html>
