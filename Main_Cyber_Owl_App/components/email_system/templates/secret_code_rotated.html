<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Code Rotated - Cyber Owl</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f7fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; border-top: 5px solid #3b82f6; }
        .header { background-color: #0f172a; color: #ffffff; text-align: center; padding: 30px 20px; }
        .logo { width: 50px; height: auto; margin-bottom: 10px; }
        .brand-name { font-size: 24px; font-weight: 700; letter-spacing: 1px; margin: 0; text-transform: uppercase; }
        .tagline { font-size: 12px; color: #94a3b8; letter-spacing: 2px; margin-top: 5px; text-transform: uppercase; }
        .content { padding: 40px 30px; text-align: center; }
        .icon { width: 64px; height: 64px; margin-bottom: 20px; color: #3b82f6; }
        .title { color: #1e293b; font-size: 24px; font-weight: 700; margin: 0 0 10px 0; }
        .message { color: #475569; font-size: 16px; line-height: 1.6; margin: 0 0 20px 0; }
        .code-box { background-color: #eff6ff; border: 2px dashed #3b82f6; border-radius: 8px; padding: 15px; font-size: 28px; font-weight: 700; color: #1e40af; letter-spacing: 4px; display: inline-block; margin: 20px 0; }
        .footer { background-color: #f8fafc; border-top: 1px solid #e2e8f0; padding: 20px; text-align: center; color: #94a3b8; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="brand-name">CYBER OWL</h1>
            <div class="tagline">ENSURE CHILD SECURITY</div>
        </div>
        <div class="content">
            <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
            </svg>
            <h2 class="title">Secret Code Rotated</h2>
            <p class="message">Your Cyber Owl secret code has been automatically rotated for security.</p>
            <div class="code-box">{{new_code}}</div>
            <p class="message" style="font-size: 14px; color: #64748b;">Use this new code to stop monitoring or access protected settings.</p>
        </div>
        <div class="footer">
            &copy; 2026 Cyber Owl Defense System.<br>
            Ensuring a safer digital environment for everyone.
        </div>
    </div>
</body>
</html>
